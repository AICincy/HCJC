name: pra-daily

on:
  schedule:
    # 09:00 UTC = 05:00 EDT — early enough that the clerk's office sees it
    # at the start of the business day.
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send:
    name: Send daily PRA requests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt

      - name: PRA — daily new-capias roster (Clerk of Courts)
        env:
          JCSTREAM_PRA_SMTP_HOST: ${{ secrets.JCSTREAM_PRA_SMTP_HOST }}
          JCSTREAM_PRA_SMTP_PORT: ${{ secrets.JCSTREAM_PRA_SMTP_PORT }}
          JCSTREAM_PRA_SMTP_USER: ${{ secrets.JCSTREAM_PRA_SMTP_USER }}
          JCSTREAM_PRA_SMTP_PASS: ${{ secrets.JCSTREAM_PRA_SMTP_PASS }}
          JCSTREAM_PRA_FROM_EMAIL: ${{ secrets.JCSTREAM_PRA_FROM_EMAIL }}
          JCSTREAM_PRA_TO_CAPIAS_EMAIL: ${{ secrets.JCSTREAM_PRA_TO_CAPIAS_EMAIL }}
        run: python -m scraper.pra_capias

      - name: PRA — booking photos (HCSO Media Relations, fallback)
        if: ${{ vars.JCSTREAM_PRA_PHOTOS_ENABLED == '1' }}
        env:
          JCSTREAM_PRA_SMTP_HOST: ${{ secrets.JCSTREAM_PRA_SMTP_HOST }}
          JCSTREAM_PRA_SMTP_PORT: ${{ secrets.JCSTREAM_PRA_SMTP_PORT }}
          JCSTREAM_PRA_SMTP_USER: ${{ secrets.JCSTREAM_PRA_SMTP_USER }}
          JCSTREAM_PRA_SMTP_PASS: ${{ secrets.JCSTREAM_PRA_SMTP_PASS }}
          JCSTREAM_PRA_FROM_EMAIL: ${{ secrets.JCSTREAM_PRA_FROM_EMAIL }}
          JCSTREAM_PRA_TO_PHOTOS_EMAIL: ${{ secrets.JCSTREAM_PRA_TO_PHOTOS_EMAIL }}
        run: python -m scraper.pra
