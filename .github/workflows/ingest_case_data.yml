name: ingest-case-data

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

concurrency:
  group: jcstream-ingest-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  ingest:
    if: ${{ contains(github.event.issue.labels.*.name, 'case-data') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt

      - name: Ingest issue body into data/courtclerk_cases.json
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_SUBMITTER: ${{ github.event.issue.user.login }}
        run: python -m scraper.ingest_issue

      - name: Commit case data
        run: |
          git config user.name "jcstream-bot"
          git config user.email "noreply@github.com"
          git add data/courtclerk_cases.json
          if ! git diff --cached --quiet; then
            git commit -m "case-data: ingest issue #${{ github.event.issue.number }}"
            git push
          else
            echo "no changes"
          fi

      - name: Acknowledge on the issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Ingested. Thank you. See `data/courtclerk_cases.json` for the canonical entry; this issue can be closed when you're done verifying.",
            });
