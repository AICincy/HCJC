name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install ruff==0.14.2 mypy==1.18.2
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy scraper web
      - run: python -m pytest -v
      - name: Verify WAF-block evidence chain
        # Walk the prev_sha256 hash chain in data/waf_block_log.json. Exits 0
        # when intact (or absent/empty), 1 on a broken link, so an out-of-band
        # edit to the committed evidence log fails CI.
        run: python -m scraper.verify_block_log
      - name: Build site from empty data (smoke test)
        # Mirror the production sweep env so this smoke test catches any
        # deployment-config drift (root-relative paths + CNAME-only routing).
        env:
          JCSTREAM_SITE_BASE_URL: ""
          JCSTREAM_CNAME: www.aretheyinjail.com
        run: python -m web.build
