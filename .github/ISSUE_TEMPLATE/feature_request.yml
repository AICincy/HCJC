name: Feature Request
description: Suggest an idea or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe it clearly.
  - type: textarea
    id: description
    attributes:
      label: Is your feature request related to a problem?
      description: Clear description of the problem or use case
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: How should this feature work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives considered
      description: Other approaches or solutions you've thought about
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context or screenshots
